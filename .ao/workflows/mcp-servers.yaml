mcp_servers:
  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "."
    env: {}

  git:
    command: npx
    args:
      - "-y"
      - "@cyanheads/git-mcp-server"
    env:
      GIT_MCP_ALLOWED_PATHS: "."

  sequential-thinking:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-sequential-thinking"
    env: {}
